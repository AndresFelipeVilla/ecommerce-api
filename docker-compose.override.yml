services:

  app:
    build:
      target: development
    ports:
      - "8086:8086"
      - "5005:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      - maven_cache:/root/.m2

  postgres:
    ports:
      - "5432:5432"

volumes:
  maven_cache:
    driver: local
