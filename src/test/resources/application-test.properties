# ─── DataSource ──────────────────────────────────────────────────────────────
# H2 in-memory database – no Docker/PostgreSQL needed for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── JWT (dummy secret only for tests) ───────────────────────────────────────
app.jwt.secret=testOnlySecretKeyThatIsAtLeast256BitsLongForHmacSha256Algorithm
app.jwt.expiration-ms=3600000

# ─── CORS (not relevant for tests, but avoids binding errors) ─────────────────
app.cors.allowed-origins=http://localhost:3000
app.cors.allowed-credentials=true

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ─── Logging (keep tests quiet) ──────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.felipe=INFO
