spring.application.name=spring-boot-template

spring.profiles.default=dev

server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.datasource.hikari.pool-name=HikariPool-SpringBootTemplate
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=0.0.1-SNAPSHOT

spring.modulith.detection-strategy=direct-sub-packages

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

app.cors.max-age=3600
