spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/appdb}
spring.datasource.username=${DATABASE_USERNAME:appuser}
spring.datasource.password=${DATABASE_PASSWORD:apppassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.com.felipe=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

management.endpoints.web.exposure.include=health,info,metrics,loggers,env
management.endpoint.health.show-details=always

app.jwt.secret=${JWT_SECRET:devOnlySecretPleaseChangeInProdMinimum256BitsLong}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080
app.cors.allowed-credentials=true
